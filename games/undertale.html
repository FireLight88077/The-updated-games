<!DOCTYPE html>
<html lang="en-us"><head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="viewport-fit=cover, width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0">
    <link rel="icon" type="x-icon" href="favicon.png">
    <title>UNDERTALE</title>
    <style>
      @keyframes rotation {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      html { background: #FFFFFF; }
      body {
        font-family: arial;
        margin: 0;
        padding: 0;
        min-height: 100vh;
        min-width: 100vw;
        background-color: black;
        display: flex;
        flex-direction: column;
        overflow-x: hidden;
        place-items: center;
      }
      body.scrollingDisabled { overflow: hidden; }
      .emscripten { padding-right: 0; display: block; }
      div.emscripten { text-align: center; font-family: "Lucida Console", Monaco, monospace; }
      canvas.emscripten {
        display: none;
        background-color: black;
        position: flex;
        transition: opacity 5s ease-in;
        opacity: 0;
        image-rendering: pixelated;
        -ms-interpolation-mode: nearest-neighbor;
      }
      canvas.active { animation-name: fadeIn; animation-duration: 2s; opacity: 1; }
      canvas.paused { animation-name: blur; animation-duration: 0.5s; filter: blur(2px) grayscale(1); }
      canvas.unpaused { animation-name: none; }
      canvas.animatedSizeTransitions { transition: width 0.3s ease, height 0.3s ease; }
      @keyframes fadeIn { 0% { opacity: 0; } 100% { opacity: 1; } }
      @keyframes blur { 0% { filter: blur(0) grayscale(0); } 100% { filter: blur(2px) grayscale(1); } }
      .spinner {
        height: 30px; width: 30px;
        animation: rotation 0.8s linear infinite;
        border: 5px solid #bdff00;
        border-top: 5px solid #719900;
        border-radius: 100%;
      }
      #status { display: inline-block; vertical-align: top; font-weight: bold; color: white; }
      #progress { width: 250px; height: 10px; appearance: none; padding: 5px; }
      progress[value]::-webkit-progress-bar { background-color: #8492a6; height: 10px; border-radius: 15px; }
      progress[value]::-webkit-progress-value { background-image: -webkit-linear-gradient(left, #719900, #bdff00); height: 10px; border-radius: 15px; }
      div.loading {
        position: absolute; top: 0; bottom: 0; left: 0; right: 0;
        display: flex; flex-direction: column; justify-content: center; align-items: center;
        pointer-events: none;
      }
      div.loading > * { padding: 10px; margin: 10px; }
      .output-container { text-align: center; margin-top: auto; }
      .output-button {
        border: none; width: 200px; height: 25px; margin: 5px;
        border-radius: 5px; cursor: pointer; background-color: black; color: white;
        outline-color: #20c20e; outline-style: dashed;
        font-family: "Lucida Console", Monaco, monospace;
      }
      #output {
        display: none; height: 200px; background-color: black; color: white;
        font-family: "Lucida Console", Monaco, monospace;
        outline: none; border: none; padding: 0; width: 100%;
      }
      #message-container {
        display: none; min-height: 50px; background-color: rgba(20,20,20,0.5);
        outline: none; border: none; padding: 0; width: 100%; position: absolute; top: 0;
      }
      #messages { margin-left: 50px; color: white; font-family: "Lucida Console", Monaco, monospace; outline: none; border: none; padding: 0; }
      #pauseMenuContainer {
        position: absolute; top: 0; bottom: 0; left: 0; right: 0;
        display: flex; justify-content: center; align-items: center;
      }
      #pauseMenuContainer[hidden] { display: none !important; opacity: 0; }
      #pauseMenuBorder {
        background: linear-gradient(135deg, #FA1E4E, transparent 40%);
        padding: 1px; border-radius: 4px;
        clip-path: polygon(10.5px 0, 100% 0, 100% 100%, 0 100%, 0 10.5px);
        width: 70vw; max-width: 400px;
      }
      #pauseMenu {
        display: flex; flex-direction: column; padding: 60px 30px 60px 30px;
        background: linear-gradient(180deg, #2E273F 16.15%, rgba(46,39,63,0.79) 56.25%, #2E273F 91.15%);
        border-radius: 4px;
        clip-path: polygon(10px 0, 100% 0, 100% 100%, 0 100%, 0 10px);
        animation-name: fadeIn; animation-duration: 0.5s; opacity: 1;
      }
      #pauseMenu button {
        font-weight: 500; font-size: 17px; color: white; background: #FA1E4E;
        border: 1px solid #FA1E4E; border-radius: 6px; padding: 12px 24px; margin: 5px 0;
        user-select: none;
      }
      #pauseMenu button#quitButton { background: #FA1E4E40; }
      #pauseMenu button:hover { filter: brightness(1.15); }
      #pauseMenu button:active { filter: brightness(0.85); }
      #pauseMenu button[hidden] { display: none; }
    </style>
  </head>
  <body>
    <canvas class="emscripten active" id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1" width="640" height="480" style="cursor: auto; display: block;"></canvas>
    <div id="pauseMenuContainer" hidden="">
      <div id="pauseMenuBorder">
        <div id="pauseMenu">
          <button id="resumeButton" onclick="resume()">Resume</button>
          <button id="quitButton" onclick="quitIfSupported()" hidden="">Quit</button>
        </div>
      </div>
    </div>
    <div class="loading">
      <div class="spinner" id="spinner" style="display: none;"></div>
      <div class="emscripten" id="status"></div>
      <progress value="0" max="100" id="progress" hidden=""></progress>
    </div>
    <div class="output-container" id="output-container">
      <button class="output-button" onclick="toggleConsole()" title="Toggle Console">Toggle Console</button>
      <button class="output-button" onclick="toggleclear_site_cache()" title="Clear site cache and saves">Clear Site Cache</button>
      <button class="output-button" id="stats-button" onclick="toggleFPS()" title="Enable FPS Counter">Enable FPS Counter</button>
      <input id="colorpicker" type="color" onchange="changecolor(this)" title="Change background color">
      <textarea id="output" rows="8"></textarea>
    </div>
    <div id="message-container">
      <div id="messages"></div>
    </div>

    <script type="text/javascript">
      function changecolor(el) { document.body.style.backgroundColor = el.value; }

      const CHANGE_ASPECT_RATIO = true;
      var bodyElement = document.getElementsByTagName("body")[0];
      var statusElement = document.getElementById("status");
      var progressElement = document.getElementById("progress");
      var spinnerElement = document.getElementById("spinner");
      var canvasElement = document.getElementById("canvas");
      var outputElement = document.getElementById("output");
      var outputContainerElement = document.getElementById("output-container");
      var pauseMenu = document.getElementById("pauseMenuContainer");
      var resumeButton = document.getElementById("resumeButton");
      var quitButton = document.getElementById("quitButton");
      const messageContainerElement = document.getElementById("message-container");
      const messagesElement = document.getElementById("messages");
      let rollbackMessages = [];

      const CONSOLE_layer_set_visible = "layer_set_visible() - could not find specified layer in current room";
      const CONSOLE_layer_tilemap_get_id = "layer_tilemap_get_id() - specified tilemap not found";
      const CONSOLE_layer_depth = "layer_depth() - can't find specified layer";
      const CONSOLE_draw_tilemap = "draw_tilemap() - couldn't find specified tilemap";
      const CONSOLE_layer_get_all_elements = "layer_get_all_elements() - can't find specified layer";

      let clearRollbackMessagesTimeoutId = -1;
      const showRollbackMessage = function(message) {
        let messages = "";
        rollbackMessages.push(message);
        rollbackMessages.forEach(m => messages += "<p>" + m + "</p>");
        messagesElement.innerHTML = messages;
        messageContainerElement.style.display = 'block';
        if (clearRollbackMessagesTimeoutId === -1) clearTimeout(clearRollbackMessagesTimeoutId);
        clearRollbackMessagesTimeoutId = setTimeout(clearRollbackMessages, 5000);
      };
      const clearRollbackMessages = function() {
        clearRollbackMessagesTimeoutId = -1;
        rollbackMessages = [];
        messageContainerElement.style.display = 'none';
      };

      var loadprogress = 0;
      var startingHeight, startingWidth, startingAspect;
      var Module = {
        preRun: [],
        postRun: [],
        print: (function() {
          var element = document.getElementById("output");
          if (element) element.value = "";
          return function(text) {
            if (text === "Starting WAD") loadprogress += 1;
            if (loadprogress === 1) Module.setStatus(text);
            else if (loadprogress >= 2) Module.setStatus("");
            if (arguments.length > 1) text = Array.prototype.slice.call(arguments).join(" ");
            if (text != CONSOLE_layer_set_visible && text != CONSOLE_layer_tilemap_get_id && text != CONSOLE_layer_depth && text != CONSOLE_draw_tilemap && text != CONSOLE_layer_get_all_elements)
              console.log(text);
            if (text === "Entering main loop.") {
              ensureAspectRatio();
              loadprogress += 1;
            }
            if (element) {
              if (text != CONSOLE_layer_set_visible && text != CONSOLE_layer_tilemap_get_id && text != CONSOLE_layer_depth && text != CONSOLE_draw_tilemap && text != CONSOLE_layer_get_all_elements)
                element.value += text + "\n";
              element.scrollTop = element.scrollHeight;
            }
          };
        })(),
        printErr: function(text) {
          if (arguments.length > 1) text = Array.prototype.slice.call(arguments).join(" ");
          console.error(text);
        },
        canvas: (function() { return document.getElementById("canvas"); })(),
        setStatus: function(text) {
          if (!Module.setStatus.last) Module.setStatus.last = { time: Date.now(), text: "" };
          if (text === Module.setStatus.last.text) return;
          var m = text.match(/([^(]+)\((\d+(\.\d+)?)\/(\d+)\)/);
          var now = Date.now();
          if (m && now - Module.setStatus.last.time < 30) return;
          Module.setStatus.last.time = now;
          Module.setStatus.last.text = text;
          if (m) {
            text = m[1];
            progressElement.value = parseInt(m[2]) * 100;
            progressElement.max = parseInt(m[4]) * 100;
            progressElement.hidden = false;
            spinnerElement.hidden = false;
          } else {
            progressElement.value = null;
            progressElement.max = null;
            progressElement.hidden = true;
            if (!text) {
              spinnerElement.style.display = "none";
              canvasElement.style.display = "block";
            }
          }
          statusElement.innerHTML = text;
        },
        totalDependencies: 0,
        monitorRunDependencies: function(left) {
          this.totalDependencies = Math.max(this.totalDependencies, left);
          Module.setStatus(left ? "Preparing... (" + (this.totalDependencies - left) + "/" + this.totalDependencies + ")" : "All downloads complete.");
        },
      };
      Module.setStatus("Downloading...");
      window.onerror = function(event) {
        Module.setStatus("Exception thrown, see JavaScript console");
        spinnerElement.style.display = "none";
        Module.setStatus = function(text) { if (text) Module.printErr("[post-exception status] " + text); };
      };

      if (typeof window === "object") {
        Module['arguments'] = window.location.search.substr(1).trim().split('&');
        if (!Module['arguments'][0]) Module['arguments'] = [];
      }

      function toggleConsole() {
        var isShown = outputElement.style.display === "flex";
        if (isShown) { outputElement.style.display = "none"; outputElement.scrollIntoView(false); }
        else { outputElement.style.display = "flex"; outputElement.scrollIntoView(true); }
      }

      function toggleclear_site_cache() {
        if (confirm("This Will Clear Site Cache\nThis will ALSO Clear ALL SAVES\nContinue?")) {
          (async () => {
            const dbs = await window.indexedDB.databases();
            dbs.forEach(db => { window.indexedDB.deleteDatabase(db.name) });
          })();
          alert("All Site Cache Has been Cleared!\nPlease reload the Page");
        }
      }

      var stopfps = 0;
      function toggleFPS() {
        stopfps += 1;
        if (stopfps === 1) {
          window.location.href = "javascript:(function(){var script=document.createElement('script');script.onload=function(){var stats=new Stats();document.body.appendChild(stats.dom);requestAnimationFrame(function loop(){stats.update();requestAnimationFrame(loop)});};script.src='https://mrdoob.github.io/stats.js/build/stats.min.js';document.head.appendChild(script);})()"
        }
        if (stopfps >= 5) stopfps = 2;
      }

      var g_pWadLoadCallback = undefined;
      function setWadLoadCallback(_wadLoadCallback) { g_pWadLoadCallback = _wadLoadCallback; }

      var g_pAddAsyncMethod = -1;
      function setAddAsyncMethod(asyncMethod) { g_pAddAsyncMethod = asyncMethod; }

      var g_pJSExceptionHandler = undefined;
      function setJSExceptionHandler(exceptionHandler) {
        if (typeof exceptionHandler == "function") g_pJSExceptionHandler = exceptionHandler;
      }
      function hasJSExceptionHandler() { return (g_pJSExceptionHandler != undefined) && (typeof g_pJSExceptionHandler == "function"); }
      function doJSExceptionHandler(exceptionJSON) {
        if (typeof g_pJSExceptionHandler == "function") {
          var exception = JSON.parse(exceptionJSON);
          g_pJSExceptionHandler(exception);
        }
      }

      function manifestFiles() {
        return ["runner.data", "runner.js", "runner.wasm", "audio-worklet.js", "game.unx"].join(";");
      }
      function manifestFilesMD5() {
        return ["f27d559c3b646eb1b6f3a14786946e2d", "db5d7a12d2cd866bf536f8ce8c8ffb94", "591f58ecebef9006336731fff76594fb", "e8f1e8db8cf996f8715a6f2164c2e44e", "b1e763db5c753fc5928976defdaccaae"];
      }

      function onFirstFrameRendered() {}
      function onGameSetWindowSize(width, height) {
        if (startingHeight === undefined && startingWidth === undefined) {
          startingHeight = height;
          startingWidth = width;
          startingAspect = startingWidth / startingHeight;
        }
      }

      function ensureAspectRatio() {
        if (canvasElement === undefined || !CHANGE_ASPECT_RATIO) return;
        if (startingHeight === undefined && startingWidth === undefined) return;
        canvasElement.classList.add("active");
        const maxWidth = window.innerWidth;
        const maxHeight = window.innerHeight;
        var newHeight, newWidth;
        var heightQuotient = startingHeight / maxHeight;
        var widthQuotient = startingWidth / maxWidth;
        if (heightQuotient > widthQuotient) {
          newHeight = maxHeight;
          newWidth = newHeight * startingAspect;
        } else {
          newWidth = maxWidth;
          newHeight = newWidth / startingAspect;
        }
        canvasElement.style.height = newHeight + "px";
        canvasElement.style.width = newWidth + "px";
      }

      function pause() {
        if (!canvasElement.classList.contains("active")) return;
        GM_pause();
        pauseMenu.hidden = false;
        canvasElement.classList.add("paused");
      }

      function resume() {
        GM_unpause();
        pauseMenu.hidden = true;
        canvasElement.classList.remove("paused");
        canvasElement.classList.add("unpaused");
      }

      function quitIfSupported() {
        if (window.oprt && window.oprt.closeTab) window.oprt.closeTab();
      }

      const resizeObserver = new ResizeObserver(() => {
        window.requestAnimationFrame(ensureAspectRatio);
        setTimeout(() => window.requestAnimationFrame(ensureAspectRatio), 100);
      });
      resizeObserver.observe(document.body);

      if (/Android|iPhone|iPod/i.test(navigator.userAgent)) {
        bodyElement.className = "scrollingDisabled";
        canvasElement.classList.add("animatedSizeTransitions");
        outputContainerElement.hidden = true;
      }

      document.addEventListener("visibilitychange", (event) => {
        if (document.visibilityState != "visible") pause();
      });

      window.addEventListener("load", (event) => {
        if ((!window.oprt || !window.oprt.closeTab) && (!window.chrome || !window.chrome.runtime || !window.chrome.runtime.sendMessage))
          quitButton.hidden = true;
      });

      setWadLoadCallback(() => {});
    </script>
    <script async="" type="text/javascript" src="runner.js"></script>
  </body>
</html>
